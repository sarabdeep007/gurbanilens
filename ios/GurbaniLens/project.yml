name: GurbaniLens
options:
  bundleIdPrefix: com.taajstudios
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  # Use the personal team for free-Apple-ID signing. Override via the
  # DEVELOPMENT_TEAM build setting when the paid Apple Developer Program
  # account is approved — no other changes required.
  defaultConfig: Debug

# iOS 16 is the deployment target because v1 uses SwiftUI NavigationStack
# (iOS 16+). At time of writing iOS 16 is on ~95%+ of iPhones; bumping below
# would require a state-driven NavigationView rewrite — not worth it for v1.

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    PRODUCT_BUNDLE_IDENTIFIER: com.taajstudios.gurbanilens
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  GurbaniLensCore:
    # Sibling SPM package in this repo (../GurbaniLensCore/)
    path: ../GurbaniLensCore
  whisper:
    # whisper.cpp Swift Package — provides `import whisper`
    url: https://github.com/ggerganov/whisper.cpp.git
    from: "1.5.4"

targets:
  GurbaniLens:
    type: application
    platform: iOS
    sources:
      - path: GurbaniLens
        excludes:
          - "**/.DS_Store"
    resources:
      - path: GurbaniLens/Resources/Assets.xcassets
        optional: true
      # Bundled Whisper ggml-*.bin (and matching CoreML .mlmodelc when present).
      # Populated by scripts/fetch_ios_deps.sh — directory is gitignored.
      - path: GurbaniLens/Resources/Models
        optional: true
      # Bundled SGGS corpus (app_database.sqlite or sggs.sqlite). Populated
      # by scripts/fetch_ios_deps.sh from data/sggs/database.sqlite —
      # directory is gitignored.
      - path: GurbaniLens/Resources/Data
        optional: true
    info:
      path: GurbaniLens/Resources/Info.plist
      properties:
        CFBundleDisplayName: GurbaniLens
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Microphone permission. Plain language; we tell the user exactly
        # what we do with audio. v1 is tap-to-record only — no background
        # listening, no recording without an explicit tap.
        NSMicrophoneUsageDescription: "GurbaniLens listens when you tap the microphone, transcribes what you recite, and looks up the matching Shabad. Audio stays on this device — nothing is uploaded."
    entitlements:
      path: GurbaniLens/Resources/GurbaniLens.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: false
    dependencies:
      - package: GurbaniLensCore
        product: GurbaniLensCore
      - package: whisper
        product: whisper
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        ENABLE_PREVIEWS: YES
