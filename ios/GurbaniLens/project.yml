name: GurbaniLens
options:
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

# iOS 16 is the deployment target because v1 uses SwiftUI NavigationStack
# (iOS 16+) and WhisperKit requires iOS 16+. At time of writing iOS 16 is on
# ~95%+ of iPhones; bumping below would require both a state-driven
# NavigationView rewrite and a different ASR engine — not worth it for v1.

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    # Bundle id chosen to be unique under a domain Deep controls (gurbanilens.org)
    # so personal-Apple-ID team signing doesn't clash with another sideloaded
    # build on a different Mac. Override DEVELOPMENT_TEAM at sign time.
    PRODUCT_BUNDLE_IDENTIFIER: org.gurbanilens.app
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  # Sibling SPM package in this repo — Swift port of the matcher (11/11
  # port-parity PASS against canonical Python).
  GurbaniLensCore:
    path: ../GurbaniLensCore
  # WhisperKit — Apple-Silicon-optimised CoreML on-device Whisper. Provides
  # `import WhisperKit`. Auto-downloads the recommended CoreML model from
  # huggingface.co/argmaxinc/whisperkit-coreml on first launch unless we
  # supply a pre-bundled modelFolder. Pin to ≥1.0.0 (released 2026-05-01).
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "1.0.0"
  # Starscream — NWConnection-backed WebSocket client. Replaces
  # URLSessionWebSocketTask for SarvamProvider streaming after the
  # latter failed with "Socket is not connected" ~500 ms after the
  # first audio frame, on 4/4 attempts. Same wire protocol (see
  # scripts/sarvam-investigation/WORKING_PROTOCOL.md), different
  # transport — production-proven in Lyft / Square / Trello.
  Starscream:
    url: https://github.com/daltoniam/Starscream.git
    from: "4.0.0"

targets:
  GurbaniLens:
    type: application
    platform: iOS
    sources:
      - path: GurbaniLens
        excludes:
          - "**/.DS_Store"
    resources:
      - path: GurbaniLens/Resources/Assets.xcassets
        optional: true
      # Optional pre-bundled WhisperKit CoreML model tree (openai_whisper-small).
      # If absent, WhisperKit auto-downloads on first launch. Populated by
      # `scripts/fetch_ios_deps.sh --bundle-model`. Gitignored.
      - path: GurbaniLens/Resources/Models
        optional: true
      # Bundled SGGS corpus (app_database.sqlite). Populated by
      # `scripts/fetch_ios_deps.sh` from data/sggs/database.sqlite. Gitignored.
      - path: GurbaniLens/Resources/Data
        optional: true
      # Bundled Noto Serif Gurmukhi (variable font, OFL-licensed).
      # Populated by `scripts/fetch_ios_deps.sh` from
      # github.com/google/fonts/tree/main/ofl/notoserifgurmukhi.
      # Gitignored — fetched, not committed.
      - path: GurbaniLens/Resources/Fonts
        optional: true
    info:
      path: GurbaniLens/Resources/Info.plist
      properties:
        CFBundleDisplayName: GurbaniLens
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Noto Serif Gurmukhi (variable font) is bundled under
        # Resources/Fonts/ and registered via UIAppFonts so SwiftUI
        # `Font.custom(...)` can resolve it. Variable font: a single
        # file carries the full weight axis; SwiftUI's `.weight()`
        # modifier picks the closest registered instance.
        UIAppFonts:
          - Fonts/NotoSerifGurmukhi-Variable.ttf
        # Microphone permission. Plain language; we tell the user exactly
        # what we do with audio. v1 is tap-to-record only — no background
        # listening, no recording without an explicit tap.
        NSMicrophoneUsageDescription: "GurbaniLens listens when you tap the microphone, transcribes what you recite, and looks up the matching Shabad. Audio stays on this device — nothing is uploaded."
    entitlements:
      # Intentionally empty entitlements file. Free-Apple-ID personal-team
      # signing rejects `com.apple.developer.kernel.increased-memory-limit`
      # (provisioning fails); WhisperKit small models fit comfortably under
      # the default iOS memory cap, so we don't need it.
      path: GurbaniLens/Resources/GurbaniLens.entitlements
    dependencies:
      - package: GurbaniLensCore
        product: GurbaniLensCore
      - package: WhisperKit
        product: WhisperKit
      - package: Starscream
        product: Starscream
    # Inject SARVAM_API_KEY + GEMINI_API_KEY from repo-root .env into the
    # built Info.plist so SarvamProvider + GeminiProvider can read them
    # via Bundle.main.object(forInfoDictionaryKey:). Wired here as a
    # postBuildScript so it runs after the Info.plist is copied into the
    # .app and before code signing — the signed bundle includes our
    # additions. The script is a no-op when .env is missing or the keys
    # are blank; cloud providers will surface "missing key" at start
    # time and the user falls back to WhisperKit via Settings.
    postBuildScripts:
      - name: Inject .env keys into Info.plist
        runOnlyWhenInstalling: false
        showEnvVars: false
        script: |
          "$SRCROOT/../../scripts/inject_env_to_plist.sh"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        ENABLE_PREVIEWS: YES
